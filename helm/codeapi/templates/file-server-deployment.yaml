{{/*
File Server Deployment
Handles file uploads/downloads to MinIO/S3.
Stateless - scales independently.
*/}}
{{- if .Values.fileServer.enabled }}
{{- $useS3 := and .Values.fileServer.s3.enabled (not .Values.minio.enabled) }}
---
{{- if .Values.fileServer.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.fileServer.serviceAccount.name | default (printf "%s-file-server" (include "codeapi.fullname" .)) }}
  labels:
    {{- include "codeapi.fileServer.labels" . | nindent 4 }}
  {{- with .Values.fileServer.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codeapi.fullname" . }}-file-server
  labels:
    {{- include "codeapi.fileServer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.fileServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "codeapi.fileServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codeapi.fileServer.selectorLabels" . | nindent 8 }}
    spec:
      # file-server does not call the Kubernetes API; the chart-wide
      # automountServiceAccountToken value (default true) can suppress the auto-mounted SA token.
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if or .Values.fileServer.serviceAccount.create .Values.fileServer.serviceAccount.name }}
      serviceAccountName: {{ .Values.fileServer.serviceAccount.name | default (printf "%s-file-server" (include "codeapi.fullname" .)) }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: file-server
          image: "{{ .Values.fileServer.image.repository }}:{{ .Values.fileServer.image.tag }}"
          imagePullPolicy: {{ .Values.fileServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fileServer.service.port }}
              protocol: TCP
          env:
{{ include "codeapi.otel.env" (dict "root" . "serviceName" "aiml-codeapi-file-server") | nindent 12 }}
            {{- if $useS3 }}
            # AWS S3 configuration (IRSA or static credentials)
            - name: MINIO_ENDPOINT
              value: {{ .Values.fileServer.s3.endpoint | quote }}
            - name: MINIO_NO_PORT
              value: "true"
            - name: MINIO_USE_SSL
              value: {{ .Values.fileServer.s3.useSSL | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.fileServer.s3.bucket | quote }}
            - name: MINIO_REGION
              value: {{ .Values.fileServer.s3.region | quote }}
            {{- if .Values.fileServer.s3.useIrsa }}
            - name: MINIO_USE_IRSA
              value: "true"
            {{- else }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: minio-secret-key
            {{- end }}
            {{- else }}
            # MinIO configuration
            - name: MINIO_ENDPOINT
              value: {{ include "codeapi.minio.endpoint" . }}
            - name: MINIO_PORT
              value: {{ include "codeapi.minio.port" . | quote }}
            - name: MINIO_USE_SSL
              value: "false"
            - name: MINIO_BUCKET
              value: {{ include "codeapi.minio.bucket" . }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: minio-secret-key
            {{- end }}
            # Redis connection
            - name: REDIS_HOST
              value: {{ include "codeapi.redis.host" . }}
            - name: REDIS_PORT
              value: {{ include "codeapi.redis.port" . | quote }}
            {{- if and (not .Values.redis.enabled) .Values.redis.external.tls }}
            - name: REDIS_TLS
              value: "true"
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: redis-password
            - name: CODEAPI_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: codeapi-internal-service-token
            # Server config
            - name: FILE_SERVER_PORT
              value: {{ .Values.fileServer.service.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 2
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.fileServer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codeapi.fullname" . }}-file-server
  labels:
    {{- include "codeapi.fileServer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.fileServer.service.type }}
  ports:
    - port: {{ .Values.fileServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "codeapi.fileServer.selectorLabels" . | nindent 4 }}
{{- end }}
