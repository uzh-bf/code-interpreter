{{/*
Secrets for sensitive configuration

WARNING: These values come from values.yaml which may be committed to version control.
For production deployments:
  - Use external secrets management (Vault, AWS Secrets Manager, Sealed Secrets)
  - Or override values at deploy time: --set redis.auth.password=$REDIS_PASSWORD
  - Never commit real credentials to version control

Set secrets.create=false to skip this Secret entirely when an external secrets operator
(External Secrets Operator, Infisical, Sealed Secrets, ...) owns codeapi-<release>-secrets.
The deployments still reference it by name, so the operator must populate every key below.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codeapi.fullname" . }}-secrets
  labels:
    {{- include "codeapi.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Internal CodeAPI service-to-service auth
  codeapi-internal-service-token: {{ .Values.internalServiceAuth.token | quote }}

  # Stateless egress gateway encrypted grant secret. Never mounted into sandbox-runner.
  codeapi-egress-grant-secret: {{ .Values.egressGrant.secret | quote }}

  # Signed execute manifest private key. Mounted only into service-worker;
  # sandbox-runner receives the public verifier from values, not this secret.
  codeapi-execution-manifest-private-key: {{ .Values.executionManifest.privateKey | quote }}

  # Redis password
  {{- if .Values.redis.enabled }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  {{- else }}
  redis-password: {{ .Values.redis.external.password | quote }}
  {{- end }}
  
  # MinIO/S3 credentials
  # Note: These keys are omitted when using IRSA (credentials provided by IAM role)
  {{- if or .Values.minio.enabled .Values.minio.useSimple }}
  minio-access-key: {{ .Values.minio.auth.rootUser | quote }}
  minio-secret-key: {{ .Values.minio.auth.rootPassword | quote }}
  {{- else if and .Values.fileServer.s3.enabled .Values.fileServer.s3.useIrsa }}
  {{- /* IRSA enabled - credentials provided by IAM role, no static secrets needed */ -}}
  {{- else if .Values.minio.external }}
  minio-access-key: {{ .Values.minio.external.accessKey | default "" | quote }}
  minio-secret-key: {{ .Values.minio.external.secretKey | default "" | quote }}
  {{- else }}
  minio-access-key: ""
  minio-secret-key: ""
  {{- end }}
{{- end }}
