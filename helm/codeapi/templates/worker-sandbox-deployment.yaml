{{/*
Split runtime deployments:
  - service-worker consumes BullMQ/Redis and calls sandbox-runner.
  - sandbox-runner runs only the sandbox API + microVM/NsJail and egresses only to egress-gateway.
*/}}
{{- if and .Values.workerSandbox.enabled (not .Values.egressGateway.enabled) }}
{{- fail "workerSandbox.enabled requires egressGateway.enabled=true because sandbox-runner may only egress to the egress gateway" }}
{{- end }}
{{- if .Values.workerSandbox.enabled }}
{{- $legacyAutoscaling := default dict .Values.workerSandbox.autoscaling }}
{{- if get $legacyAutoscaling "enabled" }}
{{- fail "workerSandbox.autoscaling.enabled was replaced by workerSandbox.sandboxRunner.autoscaling.enabled; move autoscaling settings under workerSandbox.sandboxRunner.autoscaling" }}
{{- end }}
{{- $serviceWorkerServiceAccount := .Values.workerSandbox.serviceAccount.name | default (printf "%s-service-worker" (include "codeapi.fullname" .)) }}
{{- $sandboxRunnerServiceAccount := .Values.workerSandbox.sandboxServiceAccount.name | default (printf "%s-sandbox-runner" (include "codeapi.fullname" .)) }}
{{- if not .Values.executionManifest.privateKey }}
{{- fail "workerSandbox.enabled requires executionManifest.privateKey so service-worker can sign sandbox execute manifests. The chart ships no default keypair; generate your own Ed25519 keypair (see helm/codeapi/README.md 'Execution manifest signing keys') and set it via --set or a values file (base64 DER or PEM with escaped newlines). For minikube local dev use -f values-local.yaml" }}
{{- end }}
{{- if not .Values.executionManifest.publicKey }}
{{- fail "workerSandbox.enabled requires executionManifest.publicKey so sandbox-runner can verify signed execute manifests without a signing secret. The chart ships no default keypair; derive the public key from your Ed25519 private key (see helm/codeapi/README.md 'Execution manifest signing keys') and set it via --set or a values file (base64 DER or PEM with escaped newlines). For minikube local dev use -f values-local.yaml" }}
{{- end }}
{{- range .Values.workerSandbox.sandboxExtraEnv }}
{{- $name := .name | default "" }}
{{- if and $name (or (regexMatch "(?i)(SECRET|TOKEN|PASSWORD|KEY)" $name) (hasPrefix "REDIS_" $name) (hasPrefix "AWS_" $name) (hasPrefix "S3_" $name) (hasPrefix "MINIO_" $name) (hasPrefix "CODEAPI_" $name) (eq $name "FILE_SERVER_URL") (eq $name "TOOL_CALL_SERVER_URL")) }}
{{- fail (printf "workerSandbox.sandboxExtraEnv may not set sensitive/control-plane env var %s; sandbox-runner must only receive runtime knobs and the chart-managed manifest public verifier" $name) }}
{{- end }}
{{- end }}
{{- $serviceWorkerNodeSelector := .Values.workerSandbox.serviceWorker.nodeSelector }}
{{- $serviceWorkerAffinity := .Values.workerSandbox.serviceWorker.affinity }}
{{- $serviceWorkerTolerations := .Values.workerSandbox.serviceWorker.tolerations }}
{{- if .Values.workerSandbox.serviceWorker.inheritSharedScheduling }}
{{- $serviceWorkerNodeSelector = default .Values.nodeSelector $serviceWorkerNodeSelector }}
{{- $serviceWorkerAffinity = default .Values.affinity $serviceWorkerAffinity }}
{{- $serviceWorkerTolerations = default .Values.tolerations $serviceWorkerTolerations }}
{{- end }}
{{- $sandboxRunnerNodeSelector := .Values.workerSandbox.sandboxRunner.nodeSelector }}
{{- $sandboxRunnerAffinity := .Values.workerSandbox.sandboxRunner.affinity }}
{{- $sandboxRunnerTolerations := .Values.workerSandbox.sandboxRunner.tolerations }}
{{- $serviceWorkerReplicas := .Values.workerSandbox.replicaCount }}
{{- if ne .Values.workerSandbox.serviceWorker.replicaCount nil }}
{{- $serviceWorkerReplicas = .Values.workerSandbox.serviceWorker.replicaCount }}
{{- end }}
{{- $sandboxRunnerReplicas := .Values.workerSandbox.replicaCount }}
{{- if ne .Values.workerSandbox.sandboxRunner.replicaCount nil }}
{{- $sandboxRunnerReplicas = .Values.workerSandbox.sandboxRunner.replicaCount }}
{{- end }}
{{- if .Values.workerSandbox.sandboxRunner.inheritSharedScheduling }}
{{- $sandboxRunnerNodeSelector = default .Values.nodeSelector $sandboxRunnerNodeSelector }}
{{- $sandboxRunnerAffinity = default .Values.affinity $sandboxRunnerAffinity }}
{{- $sandboxRunnerTolerations = default .Values.tolerations $sandboxRunnerTolerations }}
{{- end }}
{{- $useKvmDevicePlugin := and .Values.workerSandbox.kvmEnabled .Values.workerSandbox.kvmDevicePlugin.enabled }}
{{- $useKvmHostPath := and .Values.workerSandbox.kvmEnabled (not .Values.workerSandbox.kvmDevicePlugin.enabled) }}
{{- if and $useKvmDevicePlugin (not .Values.workerSandbox.kvmDevicePlugin.resourceName) }}
{{- fail "workerSandbox.kvmDevicePlugin.resourceName is required when kvmEnabled and kvmDevicePlugin.enabled are true" }}
{{- end }}
{{- if .Values.workerSandbox.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceWorkerServiceAccount }}
  labels:
    {{- include "codeapi.serviceWorker.labels" . | nindent 4 }}
  {{- with .Values.workerSandbox.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if .Values.workerSandbox.sandboxServiceAccount.create }}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .Values.workerSandbox.sandboxServiceAccount.automountServiceAccountToken }}
metadata:
  {{- with .Values.workerSandbox.sandboxRunner.namespaceOverride }}
  namespace: {{ . }}
  {{- end }}
  name: {{ $sandboxRunnerServiceAccount }}
  labels:
    {{- include "codeapi.sandboxRunner.labels" . | nindent 4 }}
  {{- with .Values.workerSandbox.sandboxServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codeapi.fullname" . }}-service-worker
  labels:
    {{- include "codeapi.serviceWorker.labels" . | nindent 4 }}
spec:
  replicas: {{ $serviceWorkerReplicas }}
  selector:
    matchLabels:
      {{- include "codeapi.serviceWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codeapi.serviceWorker.selectorLabels" . | nindent 8 }}
    spec:
      # service-worker does not call the Kubernetes API; suppress the auto-mounted SA token.
      automountServiceAccountToken: false
      {{- if or .Values.workerSandbox.serviceAccount.create .Values.workerSandbox.serviceAccount.name }}
      serviceAccountName: {{ $serviceWorkerServiceAccount }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36.1
          command: ['sh', '-c', 'until nc -z {{ include "codeapi.redis.host" . }} {{ include "codeapi.redis.port" . }}; do echo waiting for redis; sleep 2; done']
        - name: wait-for-sandbox-runner
          image: busybox:1.36.1
          {{- if .Values.workerSandbox.sandboxRunner.namespaceOverride }}
          command: ['sh', '-c', 'until nc -z {{ include "codeapi.fullname" . }}-sandbox-runner.{{ .Values.workerSandbox.sandboxRunner.namespaceOverride }}.svc.cluster.local {{ .Values.workerSandbox.sandbox.port }}; do echo waiting for sandbox-runner; sleep 2; done']
          {{- else }}
          command: ['sh', '-c', 'until nc -z {{ include "codeapi.fullname" . }}-sandbox-runner {{ .Values.workerSandbox.sandbox.port }}; do echo waiting for sandbox-runner; sleep 2; done']
          {{- end }}
      containers:
        - name: service-worker
          image: "{{ .Values.workerSandbox.workerImage.repository }}:{{ .Values.workerSandbox.workerImage.tag }}"
          imagePullPolicy: {{ .Values.workerSandbox.workerImage.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.workerSandbox.healthPort }}
              protocol: TCP
          env:
{{ include "codeapi.otel.env" (dict "root" . "serviceName" "aiml-codeapi-service-worker") | nindent 12 }}
            - name: CODEAPI_HARDENED_SANDBOX_MODE
              value: {{ .Values.hardenedSandboxMode | quote }}
            - name: SANDBOX_ENDPOINT
              {{- if .Values.workerSandbox.sandboxRunner.namespaceOverride }}
              value: "http://{{ include "codeapi.fullname" . }}-sandbox-runner.{{ .Values.workerSandbox.sandboxRunner.namespaceOverride }}.svc.cluster.local:{{ .Values.workerSandbox.sandbox.port }}/api/v2"
              {{- else }}
              value: "http://{{ include "codeapi.fullname" . }}-sandbox-runner:{{ .Values.workerSandbox.sandbox.port }}/api/v2"
              {{- end }}
            - name: EGRESS_GATEWAY_URL
              value: "http://{{ include "codeapi.fullname" . }}-egress-gateway:{{ .Values.egressGateway.service.port }}"
            - name: REDIS_HOST
              value: {{ include "codeapi.redis.host" . }}
            - name: REDIS_PORT
              value: {{ include "codeapi.redis.port" . | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: redis-password
            - name: CODEAPI_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: codeapi-internal-service-token
            - name: CODEAPI_EXECUTION_MANIFEST_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: codeapi-execution-manifest-private-key
            - name: EXECUTION_MANIFEST_TTL_SECONDS
              value: {{ .Values.executionManifest.ttlSeconds | quote }}
            - name: EGRESS_GRANT_TTL_SECONDS
              value: {{ .Values.egressGrant.ttlSeconds | quote }}
            - name: PYTHON_CONCURRENCY
              value: {{ .Values.workerSandbox.config.pythonConcurrency | quote }}
            - name: OTHER_CONCURRENCY
              value: {{ .Values.workerSandbox.config.otherConcurrency | quote }}
            - name: JOB_WINDOW
              value: {{ .Values.workerSandbox.config.jobWindow | quote }}
            - name: JOB_TIMEOUT
              value: {{ .Values.workerSandbox.config.jobTimeout | quote }}
            - name: WORKER_HEALTH_PORT
              value: {{ .Values.workerSandbox.healthPort | quote }}
            {{- with .Values.workerSandbox.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.workerSandbox.resources.requests.cpu }}
              memory: {{ .Values.workerSandbox.resources.requests.memory }}
            {{- with .Values.workerSandbox.resources.limits }}
            limits:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      {{- with $serviceWorkerNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceWorkerAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceWorkerTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  {{- with .Values.workerSandbox.sandboxRunner.namespaceOverride }}
  namespace: {{ . }}
  {{- end }}
  name: {{ include "codeapi.fullname" . }}-sandbox-runner
  labels:
    {{- include "codeapi.sandboxRunner.labels" . | nindent 4 }}
spec:
  {{- if not .Values.workerSandbox.sandboxRunner.autoscaling.enabled }}
  replicas: {{ $sandboxRunnerReplicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "codeapi.sandboxRunner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codeapi.sandboxRunner.selectorLabels" . | nindent 8 }}
    spec:
      # Hardened sandbox rejects unexpected CODEAPI_* env. Kubernetes injects
      # service-link env (<RELEASE>_*_SERVICE_HOST etc.) for every Service in the
      # namespace; with a codeapi-prefixed release those collide with the guard and
      # crash the sandbox. The sandbox must not get service-discovery env anyway.
      enableServiceLinks: false
      {{- if or .Values.workerSandbox.sandboxServiceAccount.create .Values.workerSandbox.sandboxServiceAccount.name }}
      serviceAccountName: {{ $sandboxRunnerServiceAccount }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.workerSandbox.sandboxServiceAccount.automountServiceAccountToken }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $useKvmHostPath }}
      securityContext:
        supplementalGroups: [{{ .Values.workerSandbox.kvmGid }}]
      {{- end }}
      containers:
        - name: sandbox-runner
          image: "{{ .Values.workerSandbox.sandboxImage.repository }}:{{ .Values.workerSandbox.sandboxImage.tag }}"
          imagePullPolicy: {{ .Values.workerSandbox.sandboxImage.pullPolicy }}
          ports:
            - name: sandbox
              containerPort: {{ .Values.workerSandbox.sandbox.port }}
              protocol: TCP
          env:
{{ include "codeapi.otel.env" (dict "root" . "serviceName" "aiml-codeapi-sandbox-runner") | nindent 12 }}
            - name: CODEAPI_HARDENED_SANDBOX_MODE
              value: {{ .Values.hardenedSandboxMode | quote }}
            - name: KVM_ENABLED
              value: {{ .Values.workerSandbox.kvmEnabled | quote }}
            - name: LAUNCHER_VCPUS
              value: {{ .Values.workerSandbox.launcher.vcpus | default 2 | quote }}
            - name: LAUNCHER_RAM_MIB
              value: {{ .Values.workerSandbox.launcher.ramMib | default 2048 | quote }}
            - name: LAUNCHER_LOG_LEVEL
              value: {{ .Values.workerSandbox.launcher.logLevel | default 3 | quote }}
            - name: LAUNCHER_FILTER_VSOCK_ENOTCONN
              value: {{ .Values.workerSandbox.launcher.filterVsockEnotconn | quote }}
            - name: SANDBOX_RUNNER_FD_LIVENESS_LIMIT
              value: {{ .Values.workerSandbox.sandboxRunner.fdLivenessLimit | default 40000 | quote }}
            - name: EGRESS_GATEWAY_URL
              {{- if .Values.workerSandbox.sandboxRunner.namespaceOverride }}
              value: "http://{{ include "codeapi.fullname" . }}-egress-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.egressGateway.service.port }}"
              {{- else }}
              value: "http://{{ include "codeapi.fullname" . }}-egress-gateway:{{ .Values.egressGateway.service.port }}"
              {{- end }}
            - name: SANDBOX_LOG_LEVEL
              value: "INFO"
            - name: SANDBOX_PACKAGES_DIRECTORY
              value: "/pkgs"
            - name: SANDBOX_MAX_PROCESS_COUNT
              value: {{ .Values.workerSandbox.sandbox.maxProcessCount | quote }}
            - name: SANDBOX_RUN_CPU_TIME
              value: {{ .Values.workerSandbox.sandbox.runCpuTime | quote }}
            - name: SANDBOX_RUN_TIMEOUT
              value: {{ .Values.workerSandbox.sandbox.runTimeout | quote }}
            - name: SANDBOX_COMPILE_CPU_TIME
              value: {{ (.Values.workerSandbox.sandbox.compileCpuTime | default 10000) | quote }}
            - name: SANDBOX_COMPILE_TIMEOUT
              value: {{ (.Values.workerSandbox.sandbox.compileTimeout | default 10000) | quote }}
            - name: SANDBOX_OUTPUT_MAX_SIZE
              value: {{ .Values.workerSandbox.sandbox.outputMaxSize | quote }}
            - name: SANDBOX_MAX_OPEN_FILES
              value: {{ .Values.workerSandbox.sandbox.maxOpenFiles | quote }}
            - name: SANDBOX_MAX_CONCURRENT_JOBS
              value: {{ (.Values.workerSandbox.sandbox.maxConcurrentJobs | default (mul (.Values.workerSandbox.launcher.vcpus | default 2) 4)) | quote }}
            - name: SANDBOX_PER_JOB_UIDS
              value: {{ .Values.workerSandbox.sandbox.perJobUids | quote }}
            - name: SANDBOX_JOB_UID_BASE
              value: {{ (.Values.workerSandbox.sandbox.jobUidBase | default 200000) | quote }}
            - name: SANDBOX_JOB_GID_BASE
              value: {{ (.Values.workerSandbox.sandbox.jobGidBase | default 200000) | quote }}
            - name: SANDBOX_JOB_UID_COUNT
              value: {{ (.Values.workerSandbox.sandbox.jobUidCount | default (.Values.workerSandbox.sandbox.maxConcurrentJobs | default (mul (.Values.workerSandbox.launcher.vcpus | default 2) 4))) | quote }}
            - name: SANDBOX_WORKSPACE_REAPER_MAX_AGE_SECONDS
              value: {{ (.Values.workerSandbox.sandbox.workspaceReaperMaxAgeSeconds | default 3600) | quote }}
            - name: SANDBOX_EXECUTE_BODY_LIMIT
              value: {{ .Values.workerSandbox.sandbox.executeBodyLimit | quote }}
            - name: SANDBOX_DISABLE_NETWORKING
              value: {{ .Values.workerSandbox.sandbox.disableNetworking | quote }}
            - name: SANDBOX_ALLOWED_LOCAL_NETWORK_PORT
              value: {{ .Values.egressGateway.service.port | quote }}
            - name: SANDBOX_FORWARD_TARGET
              {{- if .Values.workerSandbox.sandboxRunner.namespaceOverride }}
              value: "{{ include "codeapi.fullname" . }}-egress-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.egressGateway.service.port }}"
              {{- else }}
              value: "{{ include "codeapi.fullname" . }}-egress-gateway:{{ .Values.egressGateway.service.port }}"
              {{- end }}
            - name: SANDBOX_REQUIRE_EGRESS_MANIFEST
              value: "true"
            - name: SANDBOX_EXECUTION_MANIFEST_PUBLIC_KEY
              value: {{ .Values.executionManifest.publicKey | quote }}
            {{- with .Values.workerSandbox.sandboxExtraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: packages
              mountPath: /host-packages
              readOnly: true
            {{- if $useKvmHostPath }}
            - name: dev-kvm
              mountPath: /dev/kvm
            {{- end }}
          {{- if .Values.workerSandbox.kvmEnabled }}
          securityContext:
            privileged: false
            # KVM-mode sandbox-runner needs no privilege escalation: isolation is the
            # guest microVM (via /dev/kvm), not host setuid helpers. Drop it so a runner
            # compromise cannot gain new privileges, and so the pod is PSA-baseline clean.
            allowPrivilegeEscalation: false
            # Drop ALL Linux capabilities. /dev/kvm is provided as a device-plugin extended
            # resource (smarter-devices/kvm) and accessed via ioctl on an fd, which needs no
            # capability; libkrun uses no elevated cap in device-plugin mode. runAsNonRoot is
            # intentionally NOT set yet: the sandbox-runner image declares no non-root USER
            # (tracked in DEPLOY.md §11) and would otherwise fail admission.
            capabilities:
              drop:
                - ALL
            {{- if and .Values.workerSandbox.seccomp .Values.workerSandbox.seccomp.enabled }}
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/nsjail.json
            {{- else }}
            seccompProfile:
              type: RuntimeDefault
            {{- end }}
          {{- else }}
          securityContext:
            privileged: false
            {{- if and .Values.workerSandbox.seccomp .Values.workerSandbox.seccomp.enabled }}
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/nsjail.json
            {{- else }}
            seccompProfile:
              type: Unconfined
            {{- end }}
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_CHROOT
                - SYS_PTRACE
                - SETUID
                - SETGID
                - NET_ADMIN
                - DAC_OVERRIDE
                - DAC_READ_SEARCH
                - CHOWN
                - FOWNER
                - FSETID
                - KILL
                - SETFCAP
                - MKNOD
          {{- end }}
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/sandbox-runner-healthcheck.sh
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v2/health
              port: sandbox
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- $sandboxResources := deepCopy .Values.workerSandbox.resources }}
            {{- if $useKvmDevicePlugin }}
            {{- $requests := (get $sandboxResources "requests") | default dict }}
            {{- $limits := (get $sandboxResources "limits") | default dict }}
            {{- $_ := set $requests .Values.workerSandbox.kvmDevicePlugin.resourceName "1" }}
            {{- $_ := set $limits .Values.workerSandbox.kvmDevicePlugin.resourceName "1" }}
            {{- $_ := set $sandboxResources "requests" $requests }}
            {{- $_ := set $sandboxResources "limits" $limits }}
            {{- end }}
            {{- toYaml $sandboxResources | nindent 12 }}
      volumes:
        - name: packages
          {{- if .Values.workerSandbox.packages.hostPath }}
          hostPath:
            path: {{ .Values.workerSandbox.packages.hostPath }}
            type: Directory
          {{- else if .Values.workerSandbox.packages.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.workerSandbox.packages.persistence.existingClaim }}
          {{- else if .Values.workerSandbox.packages.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "codeapi.fullname" . }}-packages
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if $useKvmHostPath }}
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        {{- end }}
      {{- with $sandboxRunnerNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sandboxRunnerAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sandboxRunnerTolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  {{- with .Values.workerSandbox.sandboxRunner.namespaceOverride }}
  namespace: {{ . }}
  {{- end }}
  name: {{ include "codeapi.fullname" . }}-sandbox-runner
  labels:
    {{- include "codeapi.sandboxRunner.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.workerSandbox.sandbox.port }}
      targetPort: sandbox
      protocol: TCP
      name: sandbox
  selector:
    {{- include "codeapi.sandboxRunner.selectorLabels" . | nindent 4 }}
{{- end }}
