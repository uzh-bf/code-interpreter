{{/*
Tool Call Server Deployment
Handles programmatic tool calling (callbacks from sandbox).
Stateless - scales independently.
*/}}
{{- if .Values.toolCallServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codeapi.fullname" . }}-tool-call-server
  labels:
    {{- include "codeapi.toolCallServer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.toolCallServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "codeapi.toolCallServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codeapi.toolCallServer.selectorLabels" . | nindent 8 }}
    spec:
      # tool-call-server does not call the Kubernetes API; the chart-wide
      # automountServiceAccountToken value (default true) can suppress the auto-mounted SA token.
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tool-call-server
          image: "{{ .Values.toolCallServer.image.repository }}:{{ .Values.toolCallServer.image.tag }}"
          imagePullPolicy: {{ .Values.toolCallServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.toolCallServer.service.port }}
              protocol: TCP
          env:
{{ include "codeapi.otel.env" (dict "root" . "serviceName" "aiml-codeapi-tool-call-server") | nindent 12 }}
            # Redis connection
            - name: REDIS_HOST
              value: {{ include "codeapi.redis.host" . }}
            - name: REDIS_PORT
              value: {{ include "codeapi.redis.port" . | quote }}
            {{- if and (not .Values.redis.enabled) .Values.redis.external.tls }}
            - name: REDIS_TLS
              value: "true"
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: redis-password
            - name: CODEAPI_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "codeapi.fullname" . }}-secrets
                  key: codeapi-internal-service-token
            # Server config
            - name: TOOL_CALL_SERVER_PORT
              value: {{ .Values.toolCallServer.service.port | quote }}
            - name: TOOL_CALL_REQUEST_TIMEOUT
              value: {{ .Values.toolCallServer.config.requestTimeout | quote }}
            - name: TOOL_CALL_SESSION_EXPIRY
              value: {{ .Values.toolCallServer.config.sessionExpiry | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.toolCallServer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codeapi.fullname" . }}-tool-call-server
  labels:
    {{- include "codeapi.toolCallServer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.toolCallServer.service.type }}
  ports:
    - port: {{ .Values.toolCallServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "codeapi.toolCallServer.selectorLabels" . | nindent 4 }}
{{- end }}
