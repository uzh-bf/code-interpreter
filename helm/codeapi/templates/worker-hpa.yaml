{{- if .Values.workerSandbox.enabled }}
{{- /* externalAutoscaler (e.g. KEDA) is authoritative: it suppresses the chart HPA so the two
       cannot both own the sandbox-runner replica count. */}}
{{- if and .Values.workerSandbox.sandboxRunner.autoscaling.enabled (not .Values.workerSandbox.sandboxRunner.externalAutoscaler) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "codeapi.fullname" . }}-sandbox-runner
  labels:
    {{- include "codeapi.sandboxRunner.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "codeapi.fullname" . }}-sandbox-runner
  minReplicas: {{ .Values.workerSandbox.sandboxRunner.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.workerSandbox.sandboxRunner.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.workerSandbox.sandboxRunner.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.workerSandbox.sandboxRunner.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
