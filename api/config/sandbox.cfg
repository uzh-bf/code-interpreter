name: "sandbox"
description: "Execute sandboxed code"

mode: ONCE
hostname: "sandbox"
cwd: "/mnt/data"

time_limit: 6

# Use chroot instead of pivot_root for compatibility with RuntimeDefault seccomp.
# The runner passes a per-job user/group mapping on the NsJail command line:
# inside UID/GID 65534 maps to a short-lived outside UID/GID owned by one job.
no_pivotroot: true

keep_env: false
keep_caps: false

envar: "HOME=/mnt/data"
envar: "LANG=en_US.UTF-8"
envar: "PYTHONDONTWRITEBYTECODE=1"
envar: "PYTHONUNBUFFERED=1"
envar: "MPLBACKEND=Agg"
envar: "PATH=/usr/local/bin:/usr/bin:/bin"

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

mount_proc: false
iface_no_lo: true

# Debian bookworm uses merged-usr layout where /bin, /lib, /lib64 are
# symlinks into /usr. Mount /usr as a single read-only bind mount.
# Compatibility symlinks (/bin -> /usr/bin, etc.) are added via CLI -s flags
# in nsjail.ts since the protobuf config doesn't support the symlink field.
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/etc/ld.so.cache"
    dst: "/etc/ld.so.cache"
    is_bind: true
    rw: false
    mandatory: false
}

# Static /etc/hosts so "localhost" resolves for tool-call-server connections.
# Uses inline content instead of bind-mounting the host's /etc/hosts, which
# in Kubernetes leaks pod name, internal IP, and deployment metadata.
mount {
    src_content: "127.0.0.1 localhost\n::1 localhost\n"
    dst: "/etc/hosts"
}

# Device nodes
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
}

# Writable tmpfs for temporary files (noexec prevents binary/script execution)
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    noexec: true
    options: "size=20m"
}

# Mount fresh procfs (read-only) inside the sandbox's PID namespace.
# Fresh procfs only exposes the sandbox's own PIDs (1-2), preventing
# cross-sandbox process visibility. This requires /proc in the container
# to have no submounts — the entrypoint removes K8s/containerd proc masks
# at startup to ensure this.
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

# ── /proc masks ──
# All non-mandatory so NsJail continues if the path doesn't exist on a
# given kernel/runtime. With fresh procfs, these directly overlay the
# sandbox's procfs entries.
#
# Kernel/host info disclosure
mount { src: "/dev/null" dst: "/proc/version"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/cmdline"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/config.gz"  is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/kallsyms"   is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/modules"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/consoles"   is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/filesystems" is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/devices"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/misc"       is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/crypto"     is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/iomem"      is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/ioports"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/mtrr"       is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/dma"        is_bind: true rw: false mandatory: false }

# Hardware/system fingerprinting
mount { src: "/dev/null" dst: "/proc/cpuinfo"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/meminfo"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/uptime"     is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/loadavg"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/stat"       is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/diskstats"  is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/partitions" is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/buddyinfo"  is_bind: true rw: false mandatory: false }

# cgroup topology (reveals total cgroup count across host)
mount { src: "/dev/null" dst: "/proc/cgroups"    is_bind: true rw: false mandatory: false }

# NsJail monitor process (PID 1 in the sandbox's PID namespace).
# With fresh procfs, PID 1 is the NsJail monitor (not the container init).
# Mask to prevent sandboxed code from reading the monitor's capabilities,
# environment, mount info, and network view.
mount { src: "/dev/null" dst: "/proc/1/environ"  is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/mountinfo" is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/status"   is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/maps"     is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/smaps"    is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/cmdline"  is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/mounts"   is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/cgroup"   is_bind: true rw: false mandatory: false }
mount { src: "/dev/null" dst: "/proc/1/limits"   is_bind: true rw: false mandatory: false }
mount { dst: "/proc/1/net" fstype: "tmpfs" rw: false is_bind: false options: "size=0" }

# NOTE: /proc/self/* cannot be masked via NsJail mounts because /proc/self
# is a kernel magic symlink resolved per-process to /proc/<pid>. The
# sandboxed process reads /proc/<its-pid>/* which doesn't exist at
# mount-setup time. Known exposures (within the sandbox's PID namespace only):
#   - /proc/self/maps: ASLR layout (mitigated by seccomp blocking ptrace/bpf)
#   - /proc/self/mountinfo: NsJail internal mount tree (not container overlays)
#   - /proc/self/cgroup: sandbox cgroup path
#   - /proc/self/status: sandbox process info only (no cross-tenant leaks)
#
# With fresh procfs, only the sandbox's own PIDs are visible — no container
# processes (bun API, workers, other NsJail instances) are exposed.
#
# /proc/net is a symlink to self/net and also cannot be statically masked.
# When clone_newnet: true (default), /proc/net reflects only the sandbox's
# isolated empty network namespace. When --disable_clone_newnet is active
# (tool-call-server mode), pod network topology is exposed but traffic is
# restricted via iptables to 127.0.0.1:ALLOWED_PORT only.

# cgroup limits (defaults, overridden per-request via CLI flags)
cgroup_mem_max: 536870912
cgroup_mem_swap_max: 0
cgroup_pids_max: 64

# Seccomp policy is passed via CLI --seccomp_string in nsjail.ts
# to avoid protobuf multi-line seccomp_string concatenation issues.
